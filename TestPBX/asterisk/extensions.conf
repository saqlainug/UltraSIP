; MacSIP TestPBX dialplan — extensions per docs/TEST_PBX.md.
; STATUS: not yet executed (no Docker on primary dev machine).

[internal]
; Extension-to-extension calling
exten => 101,1,Dial(PJSIP/101,20)
 same => n,Voicemail(101@default,u)
 same => n,Hangup()
exten => 102,1,Dial(PJSIP/102,20)
 same => n,Voicemail(102@default,u)
 same => n,Hangup()
exten => 103,1,Dial(PJSIP/103,20)
 same => n,Voicemail(103@default,u)
 same => n,Hangup()

; 600: echo test — the media-verification workhorse (hear yourself =
; bidirectional RTP).
exten => 600,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; 601: one-way tone (codec/unidirectional media check)
exten => 601,1,Answer()
 same => n,Milliwatt()

; 602: DTMF verification — reads one digit and says it back.
exten => 602,1,Answer()
 same => n,Read(digit,,1)
 same => n,SayDigits(${digit})
 same => n,Hangup()

; 700 / *97: voicemail access
exten => 700,1,VoiceMailMain(@default)
exten => *97,1,VoiceMailMain(${CALLERID(num)}@default)

; 800: conference room
exten => 800,1,Answer()
 same => n,ConfBridge(macsip)

; **XXX: directed pickup (MicroSIP parity prefix)
exten => _**1XX,1,Pickup(${EXTEN:2}@internal)

; ---- failure generators (SPEC integration list) --------------------------
exten => 404,1,Hangup(1)                     ; unallocated → 404 mapping
exten => 486,1,Busy(10)
exten => 480,1,Congestion(10)
exten => 503,1,Answer()
 same => n,Hangup(34)
; 490: rings forever — cancel/timeout scenarios
exten => 490,1,Ringing()
 same => n,Wait(300)
