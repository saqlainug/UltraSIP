; MacSIP TestPBX — chan_pjsip endpoints. THROWAWAY test credentials only
; (never real accounts; CLAUDE.md). UDP-only for Milestone 1; TCP/TLS
; sections arrive with Milestone 2.
; STATUS: not yet executed (no Docker on primary dev machine).

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; ---- endpoint template -------------------------------------------------
[ep-template](!)
type=endpoint
context=internal
disallow=all
allow=ulaw
allow=alaw
allow=g722
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[auth-template](!)
type=auth
auth_type=userpass

[aor-template](!)
type=aor
max_contacts=2
remove_existing=yes

; ---- test extensions 101-103 (password pattern: test<ext>pw) ------------
[101](ep-template)
auth=auth101
aors=101
[auth101](auth-template)
username=101
password=test101pw
[101](aor-template)

[102](ep-template)
auth=auth102
aors=102
[auth102](auth-template)
username=102
password=test102pw
[102](aor-template)

[103](ep-template)
auth=auth103
aors=103
[auth103](auth-template)
username=103
password=test103pw
[103](aor-template)
