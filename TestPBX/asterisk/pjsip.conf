; MacSIP TestPBX — chan_pjsip endpoints. THROWAWAY test credentials only
; (never real accounts; CLAUDE.md). UDP-only for Milestone 1; TCP/TLS
; sections arrive with Milestone 2.
; STATUS: not yet executed (no Docker on primary dev machine).

; The PBX runs in Docker and is reached via 127.0.0.1 port mappings; it
; must advertise the host loopback (not its container IP) in SDP/headers,
; or clients send RTP into an unroutable 172.x address.
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=127.0.0.1
external_signaling_address=127.0.0.1

; TCP so large-request fallback works.
[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060
external_media_address=127.0.0.1
external_signaling_address=127.0.0.1

; TLS on 5061 with the throwaway self-signed cert (generate-certs.sh).
; Deliberately NOT trusted by the host system: MacSIP's cert-validation
; tests assert that verification FAILS by default and succeeds only with
; the per-account insecure override.
[transport-tls]
type=transport
protocol=tls
bind=0.0.0.0:5061
cert_file=/etc/asterisk/keys/asterisk.crt
priv_key_file=/etc/asterisk/keys/asterisk.key
method=tlsv1_2
external_media_address=127.0.0.1
external_signaling_address=127.0.0.1

; ---- endpoint template -------------------------------------------------
[ep-template](!)
type=endpoint
context=internal
disallow=all
allow=ulaw
allow=alaw
allow=g722
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[auth-template](!)
type=auth
auth_type=userpass

[aor-template](!)
type=aor
max_contacts=2
remove_existing=yes

; ---- test extensions 101-103 (password pattern: test<ext>pw) ------------
[101](ep-template)
auth=auth101
aors=101
[auth101](auth-template)
username=101
password=test101pw
[101](aor-template)

; 102: ICE-enabled endpoint (MacSIP's ICE integration test).
[102](ep-template)
auth=auth102
aors=102
ice_support=yes
[auth102](auth-template)
username=102
password=test102pw
[102](aor-template)

; 103: SDES-SRTP endpoint. NOTE: the current andrius/asterisk:alpine
; image ships WITHOUT res_srtp, so Asterisk 488-rejects all SAVP offers —
; this config is kept for a future SRTP-capable image (dependency-review
; before switching). Positive SRTP verification currently runs against a
; pjsua peer in tier 1.
[103](ep-template)
auth=auth103
aors=103
media_encryption=sdes
[auth103](auth-template)
username=103
password=test103pw
[103](aor-template)
